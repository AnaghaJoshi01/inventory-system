<!DOCTYPE html>
<html>
<head>
    <title>Inventory Tracker</title>
    <style>
        body { font-family: sans-serif; margin: 50px; background: #f8f9fa; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { padding: 8px; margin: 5px; }
        button { padding: 8px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #007bff; color: white; }
    </style>
</head>
<body>
    <div class="box">
        <h2>My Inventory System</h2>
        <form action="/add" method="POST">
            <input type="text" name="name" placeholder="Item Name" required>
            <input type="text" name="category" placeholder="Category">
            <input type="number" name="quantity" placeholder="Qty" required>
            <button type="submit">Add Item</button>
        </form>
        <table>
            <tr><th>ID</th><th>Name</th><th>Category</th><th>Qty</th></tr>
            {% for item in items %}
            <tr>
                <td>{{ item.id }}</td>
                <td>{{ item.name }}</td>
                <td>{{ item.category }}</td>
                <td>{{ item.quantity }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
